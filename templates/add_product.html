{% extends "base.html" %}
{% block content %}
<div style="max-width: 600px; margin: 40px auto; padding: 0 20px;">
    <div style="margin-bottom: 30px;">
        <a href="/admin/manage" style="text-decoration: none; color: #86868b; font-size: 13px;">← Back to Inventory</a>
        <h1 style="margin-top: 10px; font-size: 32px; font-weight: 700; letter-spacing: -0.5px;">Add New Product</h1>
    </div>

    <div class="card" style="padding: 30px; border: 1px solid rgba(0,0,0,0.05); background: #fff; border-radius: 18px;">
        <form method="POST" enctype="multipart/form-data" id="addProductForm">

            <div style="margin-bottom: 24px;">
                <label
                    style="display: block; margin-bottom: 8px; font-size: 12px; color: #86868b; text-transform: uppercase; font-weight: 600;">Product
                    SKU</label>
                <input type="text" name="sku" placeholder="e.g., NG-2026-CASE-01"
                    style="width: 100%; padding: 12px; border: 1px solid #d2d2d7; border-radius: 12px; font-size: 16px;">
            </div>

            <div style="margin-bottom: 24px;">
                <label
                    style="display: block; margin-bottom: 8px; font-size: 12px; color: #86868b; text-transform: uppercase; font-weight: 600;">Product
                    Name</label>
                <input type="text" name="name" placeholder="e.g., iPhone 15 Pro Case" required
                    style="width: 100%; padding: 12px; border: 1px solid #d2d2d7; border-radius: 12px; font-size: 16px;">
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px;">
                <div>
                    <label
                        style="display: block; margin-bottom: 8px; font-size: 12px; color: #86868b; text-transform: uppercase; font-weight: 600;">Base
                        Price (KES)</label>
                    <input type="number" name="price" placeholder="2500" required
                        style="width: 100%; padding: 12px; border: 1px solid #d2d2d7; border-radius: 12px; font-size: 16px;">
                </div>
                <div>
                    <label
                        style="display: block; margin-bottom: 8px; font-size: 12px; color: #86868b; text-transform: uppercase; font-weight: 600;">Initial
                        Stock</label>
                    <input type="number" name="stock" value="1" required
                        style="width: 100%; padding: 12px; border: 1px solid #d2d2d7; border-radius: 12px; font-size: 16px;">
                </div>
            </div>

            <div style="margin-bottom: 24px;">
                <label
                    style="display: block; margin-bottom: 8px; font-size: 12px; color: #86868b; text-transform: uppercase; font-weight: 600;">Upload
                    Images & Select Cover</label>
                <input type="file" name="product_images" id="imageInput" multiple accept="image/*" required
                    style="width: 100%; font-size: 13px; margin-bottom: 15px;">

                <input type="hidden" name="cover_index" id="coverIndex" value="0">

                <div id="previewContainer"
                    style="display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 10px; margin-top: 10px;">
                </div>
            </div>

            <div style="margin-bottom: 24px;">
                <label
                    style="display: block; margin-bottom: 8px; font-size: 12px; color: #86868b; text-transform: uppercase; font-weight: 600;">Description</label>
                <textarea name="description" rows="3" placeholder="Brief overview..." required
                    style="width: 100%; border-radius: 12px; border: 1px solid #d2d2d7; padding: 12px; font-family: inherit; font-size: 15px; resize: vertical;"></textarea>
            </div>

            <div style="margin-bottom: 32px;">
                <label
                    style="display: block; margin-bottom: 4px; font-size: 12px; color: #86868b; text-transform: uppercase; font-weight: 600;">Technical
                    Specifications</label>
                <textarea name="specifications" rows="3" placeholder="Color: Black, Material: Leather..."
                    style="width: 100%; border-radius: 12px; border: 1px solid #d2d2d7; padding: 12px; font-family: inherit; font-size: 15px; resize: vertical;"></textarea>
            </div>

            <button type="submit" class="btn"
                style="width: 100%; padding: 16px; font-size: 16px; font-weight: 600; border-radius: 12px;">
                Add to Inventory
            </button>
        </form>
    </div>
</div>

<script>
    const imageInput = document.getElementById('imageInput');
    const previewContainer = document.getElementById('previewContainer');
    const coverIndexInput = document.getElementById('coverIndex');

    imageInput.addEventListener('change', function () {
        previewContainer.innerHTML = '';
        const files = Array.from(this.files);

        files.forEach((file, index) => {
            const reader = new FileReader();
            reader.onload = function (e) {
                const div = document.createElement('div');
                div.style.cssText = 'position: relative; cursor: pointer; border-radius: 8px; overflow: hidden; border: 2px solid #d2d2d7;';
                div.className = 'preview-item';
                div.dataset.index = index;

                // Mark the first one as cover by default
                if (index === 0) {
                    div.style.borderColor = '#0071e3';
                    div.innerHTML += '<span style="position: absolute; top: 2px; left: 2px; background: #0071e3; color: white; font-size: 8px; padding: 2px 4px; border-radius: 4px; font-weight: bold;">COVER</span>';
                }

                div.innerHTML += `<img src="${e.target.result}" style="width: 100%; height: 80px; object-fit: cover;">`;

                div.onclick = function () {
                    // Reset all previews
                    document.querySelectorAll('.preview-item').forEach(item => {
                        item.style.borderColor = '#d2d2d7';
                        const label = item.querySelector('span');
                        if (label) label.remove();
                    });

                    // Set this one as cover
                    this.style.borderColor = '#0071e3';
                    this.innerHTML += '<span style="position: absolute; top: 2px; left: 2px; background: #0071e3; color: white; font-size: 8px; padding: 2px 4px; border-radius: 4px; font-weight: bold;">COVER</span>';
                    coverIndexInput.value = index;
                };

                previewContainer.appendChild(div);
            }
            reader.readAsDataURL(file);
        });
    });
</script>
{% endblock %}
